name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build frontend
        run: npm run build
        working-directory: .

      - name: Build Tauri
        run: npm run tauri build
        working-directory: .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: loadform-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
